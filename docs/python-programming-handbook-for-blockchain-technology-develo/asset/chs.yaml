  \    'gas': 21000,\n    'gasPrice': w3.toWei('50', 'gwei')\n}\n##### 签名交易\nsigned_tx\
  \ = w3.eth.account.signTransaction(tx, private_key)\n##### 发送交易\ntx_hash = w3.eth.sendRawTransaction(signed_tx.rawTransaction)\n\

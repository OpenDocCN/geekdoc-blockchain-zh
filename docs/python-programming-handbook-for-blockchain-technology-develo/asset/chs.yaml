  \n##### 编译智能合约\n\n在部署之前，必须将 Solidity 代码编译成字节码。你可以使用 `solc` 编译器或 Python 中的 `solcx`\
  \ 等工具。\n\n```python\nfrom solcx import compile_source\n\ncontract_source_code =\
  \ '''\npragma solidity ⁰.8.0;\n\ncontract SimpleStorage {\n    uint256 storedData;\n\

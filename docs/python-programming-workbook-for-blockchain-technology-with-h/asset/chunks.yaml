- fmt: '• `dApp` (Decentralized Application): An application that operates on a decentralized
    network like a blockchain. `dApps` are not controlled by a single entity and offer
    greater transparency and censorship resistance compared to traditional applications.


    • Cryptocurrency: A digital or virtual currency secured by cryptography. Bitcoin
    is the most well-known cryptocurrency, but many others exist with varying functionalities.


    • Mining: In Proof-of-Work (`PoW`) blockchains, miners compete to solve cryptographic
    puzzles to validate transactions and earn rewards. This process secures the network
    and adds new blocks to the chain.


    • Staking: In Proof-of-Stake (`PoS`) blockchains, users stake their cryptocurrency
    holdings to participate in the consensus mechanism. Validators are chosen based
    on their stake, and they earn rewards for validating transactions.


    • Node: A computer participating in a blockchain network. Nodes store a copy of
    the blockchain ledger, validate transactions, and contribute to the network''s
    operation.


    • Gas: A unit used to measure the computational effort required to execute a transaction
    or smart contract on a blockchain network. Users pay transaction fees in gas.


    • Public Key Infrastructure (`PKI`): A system for managing digital identities
    and verifying electronic signatures. Blockchain technology can leverage `PKI`
    for secure user authentication.


    • Decentralization: The distribution of control and operations across a peer-to-peer
    network. In contrast to centralized systems controlled by a single entity, blockchains
    promote decentralization.


    • Immutability: The property of data on a blockchain being unalterable once recorded.
    This ensures the tamper-proof nature of the ledger.


    • Transparency: All transactions and data on a public blockchain are visible to
    anyone, promoting trust and accountability within the network.


    • Fork: A blockchain split into two separate chains due to a disagreement in the
    consensus mechanism. This can lead to the creation of two different versions of
    the blockchain.


    • Hard Fork: A permanent divergence in a blockchain where the original chain and
    the forked chain become incompatible.


    • Soft Fork: A temporary divergence in a blockchain where older nodes may still
    accept blocks that newer nodes reject. Eventually, the network converges back
    to a single chain.


    • Oracle: An entity that provides external data to a blockchain network. Oracles
    are crucial for smart contracts that need to interact with real-world data feeds
    or events.


    • Non-Fungible Token (`NFT`): A unique digital asset stored on a blockchain that
